name: Run Benchmark

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider"
        type: choice
        options:
          - openrouter
          - openai
          - gemini
          - anthropic
        default: openrouter
      model:
        description: "Model to use (provider-specific model ID)"
        type: choice
        options:
          - openai/gpt-5.2
          - openai/gpt-5.2-pro
          - google/gemini-3-pro-preview
          - gpt-5.2
          - gpt-5.2-pro
          - claude-opus-4-6
        default: openai/gpt-5.2
      problem:
        description: "Run a single problem by ID (leave empty for full benchmark)"
        type: string
        default: ""

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hour hard limit

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install SageMath
        run: |
          sudo apt-get update
          sudo apt-get install -y sagemath
          sage --version

      - name: Install dependencies
        run: uv sync

      - name: Generate responses
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: >
          uv run scripts/run_benchmark.py
          --provider ${{ inputs.provider }}
          --model ${{ inputs.model }}
          --parallel 40
          ${{ inputs.problem && format('--problem {0}', inputs.problem) || '' }}

      - name: Evaluate responses
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          RESULTS_DIR=$(ls -td results/*/ 2>/dev/null | head -1)
          if [ -n "$RESULTS_DIR" ] && [ -f "$RESULTS_DIR/responses.jsonl" ]; then
            uv run scripts/evaluate_responses.py "$RESULTS_DIR" --force
          else
            echo "No responses.jsonl found to evaluate"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ inputs.provider }}-${{ github.run_id }}
          path: results/
          retention-days: 90
